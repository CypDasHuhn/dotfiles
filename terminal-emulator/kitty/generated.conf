# Kitty Configuration

# Font
font_family      monospace
font_size        12.0

# Window
remember_window_size  yes
initial_window_width  120c
initial_window_height 40c

# Tab bar
tab_bar_edge         top
tab_bar_style        powerline
tab_powerline_style  slanted

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Scrollback
scrollback_lines 10000

# URLs
url_style curly
open_url_with default

# Selection
copy_on_select no

# Cursor
cursor_shape block
cursor_blink_interval 0

# Window layout
enabled_layouts splits,stack

# Clear default keybinds and use generated ones
clear_all_shortcuts yes

map alt+shift+w close_window
map alt+shift+p kitty_shell window
map ctrl+c copy_to_clipboard
map alt+shift+d launch --location=split
map ctrl+shift+f show_scrollback
map alt+j neighboring_window down
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+k neighboring_window up
map alt+shift+t new_tab
map alt+shift+l next_tab
map ctrl+v paste_from_clipboard
map alt+shift+h previous_tab
map alt+shift+r set_tab_title
map ctrl+alt+shift+down resize_window shorter
map ctrl+alt+shift+left resize_window narrower
map ctrl+alt+shift+right resize_window wider
map ctrl+alt+shift+up resize_window taller
map alt+shift+down launch --location=hsplit
map alt+shift+left launch --location=vsplit
map alt+shift+right launch --location=vsplit
map alt+shift+up launch --location=hsplit
map alt+shift+1 goto_tab 1
map alt+shift+2 goto_tab 2
map alt+shift+3 goto_tab 3
map alt+shift+4 goto_tab 4
map alt+shift+5 goto_tab 5
map alt+shift+6 goto_tab 6
map alt+shift+7 goto_tab 7
map alt+shift+8 goto_tab 8
map alt+shift+9 goto_tab 9
map f11 toggle_fullscreen
