set -g status-position top
set -g status-right ''

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Show windows centered or left
set -g status-justify left

# Style inactive vs active window
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "bold,fg=#ffffff,bg=#5cb2ed"
setw -g window-status-style "fg=#ffffff,bg=#111111"
set -g status-style "bg=#2f3045,fg=#ffffff"
setw -g window-status-separator ""

set -g repeat-time 750

bind-key -n M-j display-message "saw M-j"
bind-key -n C-S-t display-message "saw C-S-t"

# Keep splits in the current pane's cwd to better match Zellij.
unbind '"'
unbind %
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Root bindings translated from the Zellij config.
bind-key -n C-S-h previous-window
bind-key -n C-S-l next-window
bind-key -n C-S-t new-window -c "#{pane_current_path}"
bind-key -n C-S-w kill-window
bind-key -n C-S-r command-prompt -I "#{window_name}" "rename-window '%%'"

bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -D
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-n split-window -v -c "#{pane_current_path}"
bind-key -n M-f resize-pane -Z
bind-key -n M-Left swap-window -t -1
bind-key -n M-Right swap-window -t +1
bind-key -n M-[ previous-layout
bind-key -n M-] next-layout
bind-key -n M-+ resize-pane -R 5
bind-key -n M-= resize-pane -R 5
bind-key -n M-- resize-pane -L 5

# Mode entry points approximating Zellij's modal workflow.
bind-key -n C-S-p switch-client -T zellij-pane
bind-key -n C-t switch-client -T zellij-tab
bind-key -n C-S-x switch-client -T zellij-resize
bind-key -n C-S-m switch-client -T zellij-move
bind-key -n C-S-s copy-mode \; switch-client -T zellij-scroll
bind-key -n C-S-b switch-client -T zellij-tmux

# Pane mode
bind-key -T zellij-pane Escape switch-client -T root
bind-key -T zellij-pane Enter switch-client -T root
bind-key -T zellij-pane C-p switch-client -T root
bind-key -T zellij-pane Left select-pane -L
bind-key -T zellij-pane Down select-pane -D
bind-key -T zellij-pane Up select-pane -U
bind-key -T zellij-pane Right select-pane -R
bind-key -T zellij-pane h select-pane -L
bind-key -T zellij-pane j select-pane -D
bind-key -T zellij-pane k select-pane -U
bind-key -T zellij-pane l select-pane -R
bind-key -T zellij-pane d split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zellij-pane n split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zellij-pane r split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zellij-pane p last-pane
bind-key -T zellij-pane f resize-pane -Z \; switch-client -T root
bind-key -T zellij-pane x kill-pane \; switch-client -T root
bind-key -T zellij-pane c command-prompt -I "#{pane_title}" "select-pane -T '%%'" \; switch-client -T root

# Tab mode
bind-key -T zellij-tab Escape switch-client -T root
bind-key -T zellij-tab Enter switch-client -T root
bind-key -T zellij-tab C-t switch-client -T root
bind-key -T zellij-tab Left previous-window
bind-key -T zellij-tab Down next-window
bind-key -T zellij-tab Up previous-window
bind-key -T zellij-tab Right next-window
bind-key -T zellij-tab h previous-window
bind-key -T zellij-tab j next-window
bind-key -T zellij-tab k previous-window
bind-key -T zellij-tab l next-window
bind-key -T zellij-tab Tab last-window
bind-key -T zellij-tab n new-window -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zellij-tab r command-prompt -I "#{window_name}" "rename-window '%%'" \; switch-client -T root
bind-key -T zellij-tab x kill-window \; switch-client -T root
bind-key -T zellij-tab s if-shell -F "#{synchronize-panes}" "setw synchronize-panes off" "setw synchronize-panes on"
bind-key -T zellij-tab 1 select-window -t :=1 \; switch-client -T root
bind-key -T zellij-tab 2 select-window -t :=2 \; switch-client -T root
bind-key -T zellij-tab 3 select-window -t :=3 \; switch-client -T root
bind-key -T zellij-tab 4 select-window -t :=4 \; switch-client -T root
bind-key -T zellij-tab 5 select-window -t :=5 \; switch-client -T root
bind-key -T zellij-tab 6 select-window -t :=6 \; switch-client -T root
bind-key -T zellij-tab 7 select-window -t :=7 \; switch-client -T root
bind-key -T zellij-tab 8 select-window -t :=8 \; switch-client -T root
bind-key -T zellij-tab 9 select-window -t :=9 \; switch-client -T root

# Resize mode
bind-key -T zellij-resize Escape switch-client -T root
bind-key -T zellij-resize Enter switch-client -T root
bind-key -T zellij-resize C-n switch-client -T root
bind-key -T zellij-resize Left resize-pane -L 5
bind-key -T zellij-resize Down resize-pane -D 5
bind-key -T zellij-resize Up resize-pane -U 5
bind-key -T zellij-resize Right resize-pane -R 5
bind-key -T zellij-resize h resize-pane -L 5
bind-key -T zellij-resize j resize-pane -D 5
bind-key -T zellij-resize k resize-pane -U 5
bind-key -T zellij-resize l resize-pane -R 5
bind-key -T zellij-resize H resize-pane -R 5
bind-key -T zellij-resize J resize-pane -U 5
bind-key -T zellij-resize K resize-pane -D 5
bind-key -T zellij-resize L resize-pane -L 5
bind-key -T zellij-resize + resize-pane -R 5
bind-key -T zellij-resize = resize-pane -R 5
bind-key -T zellij-resize - resize-pane -L 5

# Move mode
bind-key -T zellij-move Escape switch-client -T root
bind-key -T zellij-move Enter switch-client -T root
bind-key -T zellij-move C-h switch-client -T root
bind-key -T zellij-move Left swap-pane -U
bind-key -T zellij-move Down swap-pane -D
bind-key -T zellij-move Up swap-pane -U
bind-key -T zellij-move Right swap-pane -D
bind-key -T zellij-move h swap-pane -U
bind-key -T zellij-move j swap-pane -D
bind-key -T zellij-move k swap-pane -U
bind-key -T zellij-move l swap-pane -D
bind-key -T zellij-move n break-pane -d
bind-key -T zellij-move p swap-pane -U
bind-key -T zellij-move Tab break-pane -d

# Scroll/search mode
bind-key -T zellij-scroll Escape switch-client -T root
bind-key -T zellij-scroll Enter switch-client -T root
bind-key -T zellij-scroll C-s switch-client -T root
bind-key -T zellij-scroll C-c send-keys -X cancel
bind-key -T zellij-scroll PageUp send-keys -X page-up
bind-key -T zellij-scroll PageDown send-keys -X page-down
bind-key -T zellij-scroll Left send-keys -X page-up
bind-key -T zellij-scroll Right send-keys -X page-down
bind-key -T zellij-scroll Up send-keys -X scroll-up
bind-key -T zellij-scroll Down send-keys -X scroll-down
bind-key -T zellij-scroll h send-keys -X page-up
bind-key -T zellij-scroll l send-keys -X page-down
bind-key -T zellij-scroll j send-keys -X scroll-down
bind-key -T zellij-scroll k send-keys -X scroll-up
bind-key -T zellij-scroll d send-keys -X halfpage-down
bind-key -T zellij-scroll u send-keys -X halfpage-up
bind-key -T zellij-scroll C-b send-keys -X page-up
bind-key -T zellij-scroll C-f send-keys -X page-down
bind-key -T zellij-scroll / command-prompt -p "search" "send-keys -X search-forward '%%'"
bind-key -T zellij-scroll s command-prompt -p "search" "send-keys -X search-forward '%%'"
bind-key -T zellij-scroll n send-keys -X search-again
bind-key -T zellij-scroll p send-keys -X search-reverse

# Tmux compatibility mode mirroring Zellij's tmux table.
bind-key -T zellij-tmux Escape switch-client -T root
bind-key -T zellij-tmux Enter switch-client -T root
bind-key -T zellij-tmux Left select-pane -L \; switch-client -T root
bind-key -T zellij-tmux Down select-pane -D \; switch-client -T root
bind-key -T zellij-tmux Up select-pane -U \; switch-client -T root
bind-key -T zellij-tmux Right select-pane -R \; switch-client -T root
bind-key -T zellij-tmux h select-pane -L \; switch-client -T root
bind-key -T zellij-tmux j select-pane -D \; switch-client -T root
bind-key -T zellij-tmux k select-pane -U \; switch-client -T root
bind-key -T zellij-tmux l select-pane -R \; switch-client -T root
bind-key -T zellij-tmux Space next-layout \; switch-client -T root
bind-key -T zellij-tmux '"' split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zellij-tmux % split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zellij-tmux , command-prompt -I "#{window_name}" "rename-window '%%'" \; switch-client -T root
bind-key -T zellij-tmux [ copy-mode \; switch-client -T zellij-scroll
bind-key -T zellij-tmux c new-window -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zellij-tmux n next-window \; switch-client -T root
bind-key -T zellij-tmux o select-pane -t :.+ \; switch-client -T root
bind-key -T zellij-tmux p previous-window \; switch-client -T root
bind-key -T zellij-tmux z resize-pane -Z \; switch-client -T root
bind-key -T zellij-tmux x kill-pane \; switch-client -T root
bind-key -T zellij-tmux d detach-client
