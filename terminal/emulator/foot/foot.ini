[csd]
preferred=client
size=26
color=ff242424
border-color=ff242424
button-color=ff242424
button-minimize-color=ff383838
button-maximize-color=ff383838
button-close-color=ffF28FAD

[main]
font=JetBrainsMono Nerd Font Mono:size=16, Symbols Nerd Font Mono:size=16, Noto Sans Mono:size=16
shell=/usr/bin/nu
term=foot

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[cursor]
style=block
blink=no
