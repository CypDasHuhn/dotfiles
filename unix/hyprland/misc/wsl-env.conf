# WSL2-specific environment variables.
# HYPRLAND_BACKEND=wayland is NOT set here — it must be in the environment
# before Hyprland starts (set by the `hypr` nushell command).

# No hardware cursors: WSLg doesn't support them
env = WLR_NO_HARDWARE_CURSORS,1

# Wayland socket provided by WSLg
env = WAYLAND_DISPLAY,wayland-0

# Cursor sizes
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Prefer Wayland backend for apps launched inside Hyprland
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
